server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/compliance_db
    username: postgres
    password: Amoghgk
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

  cache:
    type: simple   # ✅ in-memory cache (no Redis needed)

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

